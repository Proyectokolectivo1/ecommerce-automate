# ============================================================
# docker-compose.prod.yml — Producción en Oracle Cloud
# ============================================================
# Despliegue en VM única con PostgreSQL, Redis, app, realtime.
# No incluye n8n (instalar por separado si se necesita).

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce}"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ecommerce}:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/${POSTGRES_DB:-ecommerce}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me}@redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change_me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://your-domain.com}
      REALTIME_URL: http://realtime:3003/emit
      REALTIME_SECRET: ${REALTIME_SECRET:-change_me}
      ORACLE_CLOUD_NAMESPACE: ${ORACLE_CLOUD_NAMESPACE:-}
      ORACLE_CLOUD_REGION: ${ORACLE_CLOUD_REGION:-}
      ORACLE_CLOUD_BUCKET: ${ORACLE_CLOUD_BUCKET:-}
      ORACLE_CLOUD_ACCESS_KEY: ${ORACLE_CLOUD_ACCESS_KEY:-}
      ORACLE_CLOUD_SECRET_KEY: ${ORACLE_CLOUD_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  realtime:
    build:
      context: ./mini-services/realtime
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3003:3003"
    environment:
      REALTIME_SECRET: ${REALTIME_SECRET:-change_me}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
